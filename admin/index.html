<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Novax Science — Enquiries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header>
    <div class="shell header-inner">
      <div>
        <div class="brand">NOVAX <span>SCIENCE</span></div>
        <p>Enquiry management</p>
      </div>
      <button id="logoutButton" class="secondary hidden">Log out</button>
    </div>
  </header>

  <main class="shell">
    <section id="loginPanel" class="login-card">
      <h1>Admin access</h1>
      <p>Enter the admin token configured in Cloudflare.</p>
      <form id="loginForm">
        <input id="tokenInput" type="password" placeholder="Admin token" required>
        <button type="submit">Open dashboard</button>
      </form>
      <small id="loginStatus"></small>
    </section>

    <section id="dashboard" class="hidden">
      <div class="dashboard-head">
        <div>
          <span class="eyebrow">NOVAX SCIENCE ADMIN</span>
          <h1>Website enquiries</h1>
        </div>
        <div class="filters">
          <input id="searchInput" placeholder="Search enquiries">
          <select id="statusFilter">
            <option value="">All statuses</option>
            <option value="new">New</option>
            <option value="replied">Replied</option>
            <option value="archived">Archived</option>
          </select>
          <button id="refreshButton">Refresh</button>
        </div>
      </div>

      <div class="stats">
        <article><span>Total loaded</span><strong id="totalCount">0</strong></article>
        <article><span>New</span><strong id="newCount">0</strong></article>
        <article><span>Replied</span><strong id="repliedCount">0</strong></article>
      </div>

      <div id="enquiryList" class="enquiry-list"></div>
      <p id="emptyState" class="empty hidden">No enquiries found.</p>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
