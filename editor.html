<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Novax Science Site Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--teal:#0aa8a5;--ink:#071315;--paper:#f5faf9;--line:#d8e7e4}
*{box-sizing:border-box}body{margin:0;background:var(--paper);font-family:Inter;color:var(--ink)}
header{background:var(--ink);color:#fff;padding:24px}.shell{width:min(1100px,calc(100% - 32px));margin:auto}
header h1{font:600 32px Space Grotesk;margin:0}header p{color:#afc1c1;margin-bottom:0}
main{padding:40px 0}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:28px;margin-bottom:18px}
h2{font:600 25px Space Grotesk;margin-top:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:block;font-size:12px;font-weight:700;margin-bottom:6px}input,textarea{width:100%;border:1px solid #c7d9d7;border-radius:10px;padding:12px;font:inherit}textarea{min-height:90px}
.product-editor{display:grid;grid-template-columns:1fr 105px 95px 105px 1.2fr;gap:10px;padding:14px 0;border-top:1px solid var(--line)}
button,.button{border:0;background:var(--teal);color:#fff;border-radius:999px;padding:13px 19px;font-weight:700;cursor:pointer}
.actions{display:flex;gap:10px;position:sticky;bottom:16px;background:rgba(245,250,249,.9);backdrop-filter:blur(10px);padding:14px;border-radius:18px}
.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
.note{font-size:12px;color:#667}
@media(max-width:760px){.grid,.product-editor{grid-template-columns:1fr}.actions{flex-direction:column}}
</style>
</head>
<body>
<header><div class="shell"><h1>Novax Science Site Editor</h1><p>Edit wording, logo path, hero image and product information, then download a replacement content.js file.</p></div></header>
<main class="shell">
<section class="panel">
<h2>Brand and hero</h2>
<div class="grid">
<div><label>Logo file path</label><input id="logo"></div>
<div><label>Hero image path</label><input id="heroImage"></div>
<div><label>Hero eyebrow</label><input id="heroEyebrow"></div>
<div><label>Hero first line</label><input id="heroTitle1"></div>
<div><label>Hero second line</label><input id="heroTitle2"></div>
<div><label>Contact email</label><input id="contactEmail"></div>
</div>
<label style="margin-top:14px">Hero description</label><textarea id="heroDescription"></textarea>
<p class="note">Upload image and logo files to the GitHub assets folder first, then enter their paths here, such as assets/logo.png.</p>
</section>

<section class="panel">
<h2>Products</h2>
<div id="products"></div>
</section>

<section class="actions">
<button id="download">Download Updated content.js</button>
<button class="secondary" id="preview">Preview Current Website</button>
</section>
</main>
<script src="content.js"></script>
<script>
const c=JSON.parse(JSON.stringify(window.NOVAX_CONTENT));
const byId=id=>document.getElementById(id);
byId('logo').value=c.brand.logo||'';
byId('heroImage').value=c.hero.image||'';
byId('heroEyebrow').value=c.hero.eyebrow||'';
byId('heroTitle1').value=c.hero.titleLine1||'';
byId('heroTitle2').value=c.hero.titleLine2||'';
byId('heroDescription').value=c.hero.description||'';
byId('contactEmail').value=c.contact?.email||'';

const products=byId('products');
c.products.forEach((p,i)=>{
 const row=document.createElement('div');row.className='product-editor';
 row.innerHTML=`<input data-i="${i}" data-k="name" value="${p.name}" aria-label="Product name">
 <input data-i="${i}" data-k="amount" value="${p.amount}" aria-label="Amount">
 <input data-i="${i}" data-k="code" value="${p.code}" aria-label="Code">
 <input data-i="${i}" data-k="price" value="${p.price||''}" placeholder="RM0" aria-label="Price">
 <input data-i="${i}" data-k="image" value="${p.image||''}" placeholder="assets/image.jpg" aria-label="Image path">`;
 products.appendChild(row);
});
byId('download').onclick=()=>{
 c.brand.logo=byId('logo').value.trim();
 c.hero.image=byId('heroImage').value.trim();
 c.hero.eyebrow=byId('heroEyebrow').value.trim();
 c.hero.titleLine1=byId('heroTitle1').value.trim();
 c.hero.titleLine2=byId('heroTitle2').value.trim();
 c.hero.description=byId('heroDescription').value.trim();
 c.contact.email=byId('contactEmail').value.trim();
 document.querySelectorAll('[data-i]').forEach(input=>c.products[+input.dataset.i][input.dataset.k]=input.value.trim());
 const text='window.NOVAX_CONTENT = '+JSON.stringify(c,null,2)+';\\n';
 const blob=new Blob([text],{type:'application/javascript'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='content.js';a.click();URL.revokeObjectURL(a.href);
};
byId('preview').onclick=()=>window.open('index.html','_blank');
</script>
</body>
</html>
